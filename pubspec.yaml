name: pzed_homes
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

# Dart 3.6+ (Flutter 3.35.3 on Vercel uses this; keep in sync with vercel_build.sh FLUTTER_VERSION)
environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  provider: ^6.1.5+1
  mobile_scanner: ^6.0.11
  supabase_flutter: ^2.10.1

  # Safe for web
  http: ^1.6.0
  go_router: ^14.8.1
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1
  printing: ^5.12.0
  pdf: ^3.11.0
  file_selector: ^1.0.3
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  uuid: ^4.5.1

  # Important web upgrade
  fl_chart: ^0.69.2
  
  table_calendar: ^3.1.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Mobile only, leave as is
  video_player: ^2.9.0
  chewie: ^1.7.4
  image_picker: ^1.1.1
  web: ^1.1.1
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    # Explicitly list all images for Flutter web compatibility
    # Standard Room
